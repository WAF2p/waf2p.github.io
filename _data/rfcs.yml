- id: "RFC-0010"
  title_en: "Assessment tooling — CLI and scorecard approach"
  title_de: "Assessment-Tooling — CLI und Scorecard-Ansatz"
  summary_en: "Defines the approach for official WAF++ assessment tooling: the WAFPass CLI, server, dashboard, and web scorecard that consume the controls library and produce a PASS score report. Shipped with WAFPass v1.0.0 and extended in v1.1.0."
  summary_de: "Definiert den Ansatz für das offizielle WAF++-Assessment-Tooling: WAFPass CLI, Server, Dashboard und Web-Scorecard, die die Controls Library nutzen und einen PASS-Score-Bericht erzeugen. Mit WAFPass v1.0.0 ausgeliefert und in v1.1.0 erweitert."
  category: tooling
  status: implemented
  author: "sascha-lewandowski"
  opened: "2026-03-11"
  decided: "2026-05-12"
  implemented: "2026-05-12"

