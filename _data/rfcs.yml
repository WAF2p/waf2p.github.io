- id: "RFC-0012"
  title_en: "Agentic pillar as the 8th pillar"
  title_de: "Agentic-Pillar als 8. Säule"
  summary_en: "Adds the Agentic pillar (WAF-AGN) as the 8th pillar of WAF++, covering autonomous AI agent governance. Ships with 10 initial controls (WAF-AGN-010 through WAF-AGN-100), regulatory mappings, and English and German documentation. Brings the framework to 8 pillars and 83+ controls."
  summary_de: "Fügt den Agentic-Pillar (WAF-AGN) als 8. Säule von WAF++ hinzu — Governance autonomer KI-Agenten. Liefert 10 initiale Controls (WAF-AGN-010 bis WAF-AGN-100), regulatorische Mappings sowie englische und deutsche Dokumentation. Erweitert das Framework auf 8 Säulen und 83+ Controls."
  category: framework
  status: implemented
  author: "sascha-lewandowski"
  opened: "2026-07-01"
  decided: "2026-07-05"
  implemented: "2026-07-05"
