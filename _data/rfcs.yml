- id: "RFC-0006"
  title_en: "Sovereign pillar (Pillar 7) — initial controls"
  title_de: "Sovereign-Pillar (Säule 7) — initiale Controls"
  summary_en: "Introduces the Sovereign pillar as the 7th pillar of WAF++, covering data sovereignty, compliance, and jurisdictional control. Ships with 10 initial controls (WAF-SOV-010 through WAF-SOV-100)."
  summary_de: "Führt den Sovereign-Pillar als 7. Säule von WAF++ ein — Datensouveränität, Compliance und jurisdiktionale Kontrolle. Liefert 10 initiale Controls (WAF-SOV-010 bis WAF-SOV-100)."
  category: framework
  status: implemented
  author: "sascha-lewandowski"
  opened: "2026-02-14"
  decided: "2026-03-04"
  implemented: "2026-03-04"

