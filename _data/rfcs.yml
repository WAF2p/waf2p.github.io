  title_en: "Contribution metadata: CONTRIBUTING, CODE_OF_CONDUCT, SECURITY"
  title_de: "Contribution-Metadaten: CONTRIBUTING, CODE_OF_CONDUCT, SECURITY"
  summary_en: "Adds the standard open-source health files to the framework repository: contribution guidelines, code of conduct (based on Contributor Covenant v2.1), and security policy."
