# ─── OPEN FOR REVIEW ────────────────────────────────────────────────────────

- id: "RFC-0008"
  title_en: "Controls schema v1 — machine-readable YAML specification"
  title_de: "Controls-Schema v1 — maschinenlesbare YAML-Spezifikation"
  summary_en: "Defines a formal JSON Schema for WAF++ controls YAML files, enabling consistent validation, tooling integration, and third-party consumption of the controls library."
  summary_de: "Definiert ein formales JSON-Schema für WAF++-Controls-YAML-Dateien, das konsistente Validierung, Tool-Integration und die Nutzung der Controls Library durch Dritte ermöglicht."
  category: tooling
  status: open
  author: "sascha-lewandowski"
  opened: "2026-03-10"
  discussion: "https://github.com/orgs/WAF2p/discussions"

- id: "RFC-0009"
  title_en: "PASS scoring model — formal specification for v1.0"
  title_de: "PASS-Scoring-Modell — formale Spezifikation für v1.0"
  summary_en: "Formalises the PASS scoring model as a normative specification: tier definitions, calculation rules, aggregation logic, and versioning contract. Required for v1.0 stability guarantee."
  summary_de: "Formalisiert das PASS-Scoring-Modell als normative Spezifikation: Tier-Definitionen, Berechnungsregeln, Aggregationslogik und Versionierungsvertrag. Voraussetzung für die v1.0-Stabilitätsgarantie."
  category: framework
  status: open
  author: "t1murl"
  opened: "2026-03-08"
  discussion: "https://github.com/orgs/WAF2p/discussions"

