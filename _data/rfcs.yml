- id: "RFC-0008"
  title_en: "Controls schema v1 — machine-readable YAML specification"
  title_de: "Controls-Schema v1 — maschinenlesbare YAML-Spezifikation"
  summary_en: "Defines a formal schema for WAF++ controls YAML files, enabling consistent validation, tooling integration, and third-party consumption of the 83+ controls library. Shipped as part of the v1.0 release."
  summary_de: "Definiert ein formales Schema für WAF++-Controls-YAML-Dateien, das konsistente Validierung, Tool-Integration und die Nutzung der 83+ Controls Library durch Dritte ermöglicht. Mit der v1.0-Release ausgeliefert."
