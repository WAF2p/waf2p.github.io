- id: "RFC-0004"
  title_en: "Documentation migration to AsciiDoc / Antora"
  title_de: "Dokumentationsmigration zu AsciiDoc / Antora"
  summary_en: "Migrates all framework documentation from Markdown to AsciiDoc and establishes Antora as the documentation build system with component versioning (v1.0)."
  summary_de: "Migriert die gesamte Framework-Dokumentation von Markdown nach AsciiDoc und etabliert Antora als Dokumentations-Build-System mit Komponenten-Versionierung (v1.0)."
