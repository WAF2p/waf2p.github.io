  title_en: "CI/CD pipeline for framework and tooling repositories"
  title_de: "CI/CD-Pipeline für Framework- und Tooling-Repositories"
  summary_en: "Introduces automated checks and release workflows for the framework, pass, wafpass-server, and wafpass-dashboard repositories: Antora build validation, controls YAML linting, release automation, and link checking on every pull request."
