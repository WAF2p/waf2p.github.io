  title_en: "Pillar descriptions and key questions — 7 pillars"
  title_de: "Pillar-Beschreibungen und Kernfragen — 7 Säulen"
  summary_en: "Adds the initial content definition for each of the 7 pillars: scope, rationale, and key assessment questions. Serves as the baseline for the controls library and was later extended to cover the 8th Agentic pillar (RFC-0012)."
  summary_de: "Fügt die initiale Inhaltsdefinition für jede der 7 Säulen hinzu: Scope, Begründung und Kernbewertungsfragen. Bildet die Basis für die Controls Library und wurde später um die 8. Säule Agentic erweitert (RFC-0012)."
  category: framework
  status: implemented
