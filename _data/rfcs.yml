- id: "RFC-0003"
  title_en: "Pillar descriptions and key questions — all 7 pillars"
  title_de: "Pillar-Beschreibungen und Kernfragen — alle 7 Säulen"
  summary_en: "Adds the initial content definition for each of the 7 pillars: scope, rationale, and key assessment questions. Serves as the baseline for the controls library."
  summary_de: "Fügt die initiale Inhaltsdefinition für jede der 7 Säulen hinzu: Scope, Begründung und Kernbewertungsfragen. Bildet die Basis für die Controls Library."
  category: framework
  status: implemented
  author: "sascha-lewandowski"
