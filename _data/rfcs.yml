# RFC Tracker — WAF++ Framework
#
# Statuses:
#   draft          — being written, not yet open for community review
#   open           — open for community comment (5+ business days)
#   accepted       — decision made: accepted, not yet implemented
#   implemented    — accepted and shipped
#   rejected       — decision made: not accepted
#   withdrawn      — pulled by the author before decision
#
# Categories:
#   framework      — pillar content, scoring model, controls
#   governance     — process, roles, decision-making
#   tooling        — CLI, schemas, automation, CI
#   docs           — documentation structure and format
#
# Fields:
#   id             — RFC-NNNN (sequential)
#   title_en       — short descriptive title (English)
#   title_de       — short descriptive title (German)
#   summary_en     — 1–2 sentence description (English)
#   summary_de     — 1–2 sentence description (German)
#   category       — see above
#   status         — see above
#   author         — GitHub username or name
#   opened         — YYYY-MM-DD when posted for community review
#   decided        — YYYY-MM-DD when decision was made (omit if still open)
#   implemented    — YYYY-MM-DD when merged/shipped (omit if not yet)
#   discussion     — URL to GitHub Discussion (omit if none)
#   pr             — PR number (omit if none)
#   repo           — GitHub repo slug under WAF2p (default: framework)

# ─── IMPLEMENTED ────────────────────────────────────────────────────────────

- id: "RFC-0001"
  title_en: "Initial 7-pillar framework structure"
  title_de: "Initiale 7-Säulen-Framework-Struktur"
  summary_en: "Establishes the core seven-pillar model as the foundational structure of WAF++, covering Security, Reliability, Performance Efficiency, Cost Optimisation, Operational Excellence, Sustainability, and Developer Experience. Extended to eight pillars by RFC-0012."
  summary_de: "Legt das grundlegende Sieben-Säulen-Modell als Basis von WAF++ fest: Sicherheit, Zuverlässigkeit, Performance-Effizienz, Kostenoptimierung, Operationelle Exzellenz, Nachhaltigkeit und Developer Experience. Durch RFC-0012 auf acht Säulen erweitert."
  category: framework
  status: implemented
  author: "sascha-lewandowski"
  opened: "2025-12-05"
  decided: "2025-12-05"
  implemented: "2025-12-05"
  pr: 1

- id: "RFC-0002"
  title_en: "Public 2026 roadmap and milestone planning"
  title_de: "Öffentliche Roadmap 2026 und Meilensteinplanung"
  summary_en: "Defines the public roadmap for 2026 covering Q1–Q4 milestones, including v1.0 target, pilot programme, and foundation readiness goals."
  summary_de: "Definiert die öffentliche Roadmap für 2026 mit Q1–Q4-Meilensteinen, v1.0-Ziel, Pilotprogramm und Foundation-Readiness-Zielen."
  category: governance
  status: implemented
