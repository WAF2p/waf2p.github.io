- id: "RFC-0009"
  title_en: "PASS scoring model — formal specification for v1.0"
  title_de: "PASS-Scoring-Modell — formale Spezifikation für v1.0"
  summary_en: "Formalises the PASS scoring model as a normative specification: tier definitions, calculation rules, aggregation logic, and versioning contract. Required for and shipped with the WAFPass CLI / Server v1.0.0 release."
  summary_de: "Formalisiert das PASS-Scoring-Modell als normative Spezifikation: Tier-Definitionen, Berechnungsregeln, Aggregationslogik und Versionierungsvertrag. Voraussetzung für und ausgeliefert mit WAFPass CLI / Server v1.0.0."
