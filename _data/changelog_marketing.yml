# Marketing site changelog — data source for /changelog/ and /de/changelog/
# Marketing site v1.0 = the February 2026 redesign (PR #47)
# Order: newest first. Add new groups at the top.
# Types: new | improvement | fix | docs | infra | breaking

- group_en: "May 2026"
  group_de: "Mai 2026"
  date: "2026-05-12"
  changes:
    - type: new
      text_en: "Release countdown modal and homepage counter — announcement modal (shown once per browser) and live countdown bar for the WAF++ 1.0 & WAFPass 1.0 release on 12 May 2026; bilingual (EN/DE); countdown resets to 'live' message after the release date"
      text_de: "Release-Countdown-Modal und Homepage-Counter — Ankündigungs-Modal (einmal pro Browser gezeigt) und Live-Countdown-Leiste für das WAF++ 1.0 & WAFPass 1.0 Release am 12. Mai 2026; zweisprachig (EN/DE); Countdown wechselt nach dem Release-Datum zu 'live'-Meldung"
    - type: improvement
      text_en: "Changelog pages (EN + DE) — v1.0.0 entries added for all four components (Framework, WAFPass CLI, WAFPass Dashboard, WAFPass Server); beta notices replaced with green 'released' notices for all WAFPass and Framework panes"
      text_de: "Changelog-Seiten (EN + DE) — v1.0.0-Einträge für alle vier Komponenten hinzugefügt (Framework, WAFPass CLI, WAFPass Dashboard, WAFPass Server); Beta-Hinweise durch grüne 'veröffentlicht'-Hinweise für alle WAFPass- und Framework-Panes ersetzt"
    - type: improvement
      text_en: "WAFPass page (EN + DE) — updated to v1.0.0: badge changed from 'v0.4.0 · Beta' to 'v1.0.0 · Stable'; hero lead updated to announce stable release; PyPI install instruction added (pip install wafpass-core); beta badge removed from requirements section; all v0.4.0 version references updated"
      text_de: "WAFPass-Seite (EN + DE) — auf v1.0.0 aktualisiert: Badge von 'v0.4.0 · Beta' auf 'v1.0.0 · Stabil' geändert; Hero-Lead aktualisiert, um das stabile Release anzukündigen; PyPI-Installationsanleitung hinzugefügt (pip install wafpass-core); Beta-Badge aus dem Anforderungsbereich entfernt; alle v0.4.0-Versionsreferenzen aktualisiert"
    - type: improvement
      text_en: "Roadmap pages (EN + DE) — NOW section updated from 'v1.0 target' to 'v1.0.0 released'; kicker changed from 'NOW' to 'RELEASED'; release tracker cards all show green check-circle; WAFPass tracker entry updated to show v0.3.0 → v0.4.0 → v1.0.0 progression"
      text_de: "Roadmap-Seiten (EN + DE) — JETZT-Sektion von 'v1.0-Ziel' auf 'v1.0.0 veröffentlicht' aktualisiert; Kicker von 'JETZT' auf 'VERÖFFENTLICHT' geändert; alle Release-Tracker-Karten zeigen grünes Check-Kreissymbol; WAFPass-Tracker-Eintrag zeigt Progression v0.3.0 → v0.4.0 → v1.0.0"

- group_en: "April 2026"
  group_de: "April 2026"
  date: "2026-04-01"
  changes:
    - type: improvement
      text_en: "WAFPass page (EN + DE) — updated to v0.3.0: new WAFPass ecosystem section explaining the three-component architecture (wafpass CLI, wafpass-dashboard, wafpass-server) with architecture flow diagram; dashboard section rewritten to reflect the React/Vite SPA and FastAPI/PostgreSQL stack; intelligence layer expanded from 4 to 6 cards (Terraform plan analysis, exploit path analysis added); feature grid extended with Policy Version Tracking and Settings Persistence; badge updated to v0.3.0; PyPI note updated"
      text_de: "WAFPass-Seite (EN + DE) — auf v0.3.0 aktualisiert: neue WAFPass-Ökosystem-Sektion mit Erklärung der Drei-Komponenten-Architektur (wafpass CLI, wafpass-dashboard, wafpass-server) und Architektur-Flussdiagramm; Dashboard-Sektion komplett überarbeitet für React/Vite SPA und FastAPI/PostgreSQL-Stack; Intelligence-Layer von 4 auf 6 Karten erweitert (Terraform-Plan-Analyse, Exploit-Pfad-Analyse hinzugefügt); Feature-Grid um Policy-Versions-Tracking und Einstellungs-Persistenz ergänzt; Badge auf v0.3.0 aktualisiert; PyPI-Hinweis aktualisiert"
    - type: improvement
      text_en: "Roadmap page (EN + DE) — updated to reflect actual March 2026 progress: WAFPass v0.3.0 live, all 7 pillars documented ahead of schedule, dashboard and server stack live; Q4 2026 card revised from 'Complete Pillar Build-Out' to 'Stabilization & Ecosystem Growth' since the pillar milestone was achieved early"
      text_de: "Roadmap-Seite (EN + DE) — aktualisiert mit dem tatsächlichen Fortschritt vom März 2026: WAFPass v0.3.0 live, alle 7 Säulen vorzeitig dokumentiert, Dashboard- und Server-Stack live; Q4-2026-Karte von 'Vollständige Säulen-Ausarbeitung' zu 'Stabilisierung & Ökosystem-Wachstum' überarbeitet, da das Säulen-Meilenstein vorzeitig erreicht wurde"
    - type: fix
      text_en: "Fixed missing LinkedIn icons — polyfilled the 'linkedin' Lucide icon (removed alongside other brand icons); affects all staff member profile pages"
      text_de: "Fehlende LinkedIn-Icons behoben — 'linkedin'-Lucide-Icon (zusammen mit anderen Brand-Icons entfernt) nachträglich bereitgestellt; betrifft alle Teammitglieder-Profilseiten"
    - type: improvement
      text_en: "Changelog page — mobile layout fixed: tab navigation now scrolls horizontally on small screens (overflow-x: auto, hidden scrollbar, nowrap labels) preventing layout overflow on mobile"
      text_de: "Changelog-Seite — Mobile-Layout korrigiert: Tab-Navigation scrollt auf kleinen Bildschirmen jetzt horizontal (overflow-x: auto, versteckter Scrollbar, nowrap-Labels) und verhindert Layout-Überlauf auf Mobilgeräten"

