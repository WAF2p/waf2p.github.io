# WAFPass Dashboard changelog — data source for /changelog/ and /de/changelog/
# wafpass-dashboard is the React / Vite SPA companion to the wafpass CLI.
# Order: newest first. Add new groups at the top.
# Types: new | improvement | fix | docs | infra | breaking

- group_en: "March 2026 — Initial Release"
  group_de: "März 2026 — Erste Version"
  version: "v0.3.0"
  date: "2026-03-28"
  beta: true
  changes:
    - type: new
      text_en: "Terraform plan changes page — visualises resource-level changes from a Terraform plan dry-run before apply; integrates with wafpass-server"
      text_de: "Terraform-Plan-Änderungsseite — visualisiert Ressourcen-Änderungen eines Terraform-Plan-Dry-Runs vor dem Apply; integriert mit wafpass-server"
    - type: improvement
      text_en: "Dashboard page overhaul — richer metrics, control state breakdown, compliance score timeline, and run comparison view"
      text_de: "Dashboard-Seite überarbeitet — reichhaltigere Metriken, Control-Status-Aufschlüsselung, Compliance-Score-Timeline und Run-Vergleichsansicht"
    - type: improvement
      text_en: "Exploit paths page redesigned — clearer attack chain visualisation with severity badges and remediation links"
      text_de: "Exploit-Pfad-Seite neu gestaltet — klarere Angriffsketten-Visualisierung mit Schweregrad-Badges und Remediation-Links"
    - type: improvement
      text_en: "Controls and run scan pages polished — improved layout, filtering, and user interaction flows"
      text_de: "Controls- und Run-Scan-Seiten poliert — verbessertes Layout, Filterung und Benutzerinteraktionsflüsse"
    - type: fix
      text_en: "Release workflow bugfix and missing file patch"
      text_de: "Bugfix im Release-Workflow und fehlende Datei ergänzt"
    - type: new
      text_en: "Full-featured SPA — Dashboard, Compliance, Controls, Findings, Regions, Risk Acceptance (Waivers), Sandbox, Settings, Exploit Paths, and Run Scan pages"
      text_de: "Vollständige SPA — Seiten für Dashboard, Compliance, Controls, Findings, Regionen, Risiko-Akzeptanz (Waivers), Sandbox, Einstellungen, Exploit-Pfade und Run-Scan"
    - type: new
      text_en: "React / Vite SPA with Docker + nginx — self-contained container served behind nginx; deployable standalone or as part of the WAFPass stack"
      text_de: "React / Vite SPA mit Docker + nginx — eigenständiger Container hinter nginx; deploybar als Standalone oder als Teil des WAFPass-Stacks"
