# WAFPass Dashboard changelog — data source for /changelog/ and /de/changelog/
# wafpass-dashboard is the React / Vite SPA companion to the wafpass CLI.
# wafpass-dashboard v1.0.0 released: 2026-05-12
# Order: newest first. Add new groups at the top.
# Types: new | improvement | fix | docs | infra | breaking

- group_en: "May 2026 — Control Pack & Localization"
  group_de: "Mai 2026 — Control Pack & Lokalisierung"
  version: "v1.0.0"
  date: "2026-05-12"
  beta: false
  changes:
    - type: new
      text_en: "Control pack system integration — dashboard reflects versioned control snapshots from wafpass-server; control update notifications shown when local packs drift from published versions"
      text_de: "Control-Pack-Systemintegration — Dashboard spiegelt versionierte Control-Snapshots von wafpass-server wider; Control-Update-Benachrichtigungen bei Versionsdrift von lokalen Packs"
    - type: new
      text_en: "Complete internationalization — full support for 6+ languages (en, de, fr, es, pt, br); all 58+ pages fully localized with translated UI strings, help text, and error messages"
      text_de: "Vollständige Internationalisierung — volle Unterstützung für 6+ Sprachen (en, de, fr, es, pt, br); alle 58+ Seiten vollständig lokalisert mit übersetzten UI-Strings, Hilfetexten und Fehlermeldungen"
    - type: new
      text_en: "LANGUAGE.md documentation — complete i18n guide documenting translation workflow, adding new languages, and managing locale files"
      text_de: "LANGUAGE.md-Dokumentation — vollständiger i18n-Leitfaden mit Dokumentation des Übersetzungsworkflows, Hinzufügen neuer Sprachen und Verwalten von Locale-Dateien"
    - type: new
      text_en: "i18n framework — `src/i18n/` directory with locale loaders, translation context, and language selector component; runtime language switching without page reload"
      text_de: "i18n-Framework — `src/i18n/`-Verzeichnis mit Locale-Loadern, Übersetzungs-Kontext und Sprachauswahl-Komponente; Sprachumschaltung zur Laufzeit ohne Neuladen der Seite"

- group_en: "May 2026"
  group_de: "Mai 2026"
  version: "v1.0.0"
  date: "2026-05-12"
  beta: false
  changes:
    - type: new
      text_en: "wafpass-dashboard v1.0.0 — first stable release. All 22+ pages are stable and ship with the v1.0.0 Docker image. Full SSO integration (OIDC/SAML2) and role-based access control (clevel → ciso → architect → engineer) enabled by default."
      text_de: "wafpass-dashboard v1.0.0 — erste stabile Veröffentlichung. Alle 22+ Seiten sind stabil und werden mit dem v1.0.0-Docker-Image ausgeliefert. Vollständige SSO-Integration (OIDC/SAML2) und rollenbasierte Zugriffskontrolle (clevel → ciso → architect → engineer) standardmäßig aktiviert."
    - type: improvement
      text_en: "Evidence Package page (#/evidence) stable — auditor-ready HTML report with regulatory mapping, active waivers, risk acceptances, and embedded JSON manifest; printable to PDF for regulatory submissions"
      text_de: "Evidence-Package-Seite (#/evidence) stabil — audit-fähiger HTML-Bericht mit regulatorischem Mapping, aktiven Waivers, Risk-Acceptances und eingebettetem JSON-Manifest; für regulatorische Einreichungen als PDF druckbar"
    - type: improvement
      text_en: "Gap Analysis page (#/gapanalysis) stable — regulatory gap analysis covers SOC 2, ISO 27001, PCI-DSS, GDPR, BSI C5, HIPAA, and NIS2; directly linked to v1.0.0 control regulatory tags"
      text_de: "Gap-Analysis-Seite (#/gapanalysis) stabil — regulatorische Gap-Analyse deckt SOC 2, ISO 27001, PCI-DSS, DSGVO, BSI C5, HIPAA und NIS2 ab; direkt mit den regulatorischen Tags der v1.0.0-Controls verknüpft"
    - type: improvement
      text_en: "Maturity level presets (L1–L5) locked — control sets and feature toggles for each maturity level are frozen at v1.0.0 and aligned with the PASS scoring model"
      text_de: "Reifegradvoreinstellungen (L1–L5) eingefroren — Control-Sets und Feature-Toggles für jeden Reifegrad sind auf v1.0.0 eingefroren und mit dem PASS-Scoring-Modell abgestimmt"
    - type: new
      text_en: "Docker image published as waf2p/wafpass-dashboard:1.0.0 on Docker Hub — stable tag; deployable standalone (nginx) or as part of the full WAFPass stack"
      text_de: "Docker-Image als waf2p/wafpass-dashboard:1.0.0 auf Docker Hub veröffentlicht — stabiles Tag; als Standalone (nginx) oder als Teil des vollständigen WAFPass-Stacks deploybar"

- group_en: "April 2026"
  group_de: "April 2026"
  version: "v1.0.0"
  date: "2026-04-25"
  beta: false
  changes:
    - type: new
      text_en: "Project Overview page (`#/projects`) — per-project compliance summary, run history, score timeline, and team member list"
      text_de: "Projektübersichts-Seite (`#/projects`) — projektbezogene Compliance-Zusammenfassung, Run-Historie, Score-Timeline und Teammitgliederliste"
    - type: new
      text_en: "Passport Dashboard page (`#/passport`) — project maturity passport showing PASS score levels, active pillar coverage, regulatory badge grid, and a shareable passport image configured in wafpass-server"
      text_de: "Passport-Dashboard-Seite (`#/passport`) — Projekt-Reifegradpass mit PASS-Score-Ebenen, aktiver Pillar-Abdeckung, regulatorischem Badge-Raster und einem in wafpass-server konfigurierbaren teilbaren Passport-Bild"
    - type: new
      text_en: "Leaderboard page (`#/leaderboard`) — team compliance leaderboard ranked by PASS score with score delta badges per member"
      text_de: "Leaderboard-Seite (`#/leaderboard`) — Team-Compliance-Leaderboard nach PASS-Score geordnet mit Score-Delta-Badges je Mitglied"
    - type: new
      text_en: "Badges page (`#/badges`) — earned achievement badges per user; badge verification drawer shows the ECDSA-signed proof fetched from wafpass-server"
      text_de: "Badges-Seite (`#/badges`) — verdiente Achievement-Badges je Nutzer; Badge-Verifikations-Drawer zeigt den von wafpass-server abgerufenen ECDSA-signierten Nachweis"
    - type: improvement
      text_en: "Evidence page overhaul — Evidence Package page redesigned to support the evidence lock flow; locked evidence records display a SHA-256 fingerprint and a QR code for offline audit verification"
      text_de: "Evidence-Seite überarbeitet — Evidence-Package-Seite überarbeitet, um den Evidence-Lock-Flow zu unterstützen; gesperrte Evidence-Einträge zeigen einen SHA-256-Fingerprint und einen QR-Code zur Offline-Audit-Verifikation"
    - type: infra
      text_en: "Test suite introduced — `src/__tests__/api.test.ts`, `audit.test.ts`, and `useControlsCatalogue.test.ts` added; vitest configuration included; covers API helpers, audit utilities, and the controls catalogue hook"
      text_de: "Test-Suite eingeführt — `src/__tests__/api.test.ts`, `audit.test.ts` und `useControlsCatalogue.test.ts` hinzugefügt; vitest-Konfiguration enthalten; deckt API-Helfer, Audit-Utilities und den Controls-Katalog-Hook ab"
    - type: infra
      text_en: "Sidebar component extracted — `src/components/Sidebar.tsx` replaces inline navigation in `App.tsx`; routing refactored for all new pages; navigation state managed via `AuthContext`"
      text_de: "Sidebar-Komponente ausgelagert — `src/components/Sidebar.tsx` ersetzt die interne Navigation in `App.tsx`; Routing für alle neuen Seiten überarbeitet; Navigationszustand über `AuthContext` verwaltet"

- group_en: "April 2026 — Authorization & User Management"
  group_de: "April 2026 — Autorisierung & Benutzerverwaltung"
  date: "2026-04-19"
  beta: true
  changes:
    - type: new
      text_en: "Login page — `/login` route with JWT auth form; `AuthContext` manages token storage, refresh, and logout state across the entire SPA"
      text_de: "Login-Seite — `/login`-Route mit JWT-Authentifizierungsformular; `AuthContext` verwaltet Token-Speicherung, Refresh und Logout-Zustand in der gesamten SPA"
    - type: new
      text_en: "User Management page (`#/users`) — list, invite, and remove users; assign roles per user within the configured role hierarchy (clevel → ciso → architect → engineer)"
      text_de: "Benutzerverwaltungs-Seite (`#/users`) — Benutzer auflisten, einladen und entfernen; Rollen je Benutzer innerhalb der konfigurierten Rollenhierarchie (clevel → ciso → architect → engineer) zuweisen"
    - type: new
      text_en: "API Management page (`#/api-management`) — generate and revoke API keys for CI/CD integrations; view per-key usage log sourced from wafpass-server"
      text_de: "API-Management-Seite (`#/api-management`) — API-Keys für CI/CD-Integrationen generieren und widerrufen; per-Key-Nutzungsprotokoll aus wafpass-server anzeigen"
    - type: new
      text_en: "SSO Settings page (`#/sso-settings`) — configure OIDC and SAML2 identity providers from within the dashboard; test-provider connectivity button sends a live validation request to wafpass-server"
      text_de: "SSO-Einstellungs-Seite (`#/sso-settings`) — OIDC- und SAML2-Identity-Provider direkt im Dashboard konfigurieren; Test-Provider-Verbindungsschaltfläche sendet eine Live-Validierungsanfrage an wafpass-server"
    - type: new
      text_en: "Group Mappings page (`#/group-mappings`) — map IdP group claims to WAFPass roles per provider; create, edit, and delete mappings stored in wafpass-server"
      text_de: "Gruppen-Mapping-Seite (`#/group-mappings`) — IdP-Gruppenansprüche je Provider auf WAFPass-Rollen abbilden; in wafpass-server gespeicherte Mappings erstellen, bearbeiten und löschen"

- group_en: "April 2026 — Scanning & Stage"
  group_de: "April 2026 — Scanning & Stage"
  date: "2026-04-17"
  beta: true
  changes:
    - type: new
      text_en: "Run Scan from UI — RunScanPage sends POST `/api/scans` to wafpass-server and streams the result into the dashboard; removes dependency on a local CLI installation for interactive scanning"
      text_de: "Run Scan aus der UI — RunScanPage sendet POST `/api/scans` an wafpass-server und streamt das Ergebnis ins Dashboard; beseitigt die Abhängigkeit von einer lokalen CLI-Installation für interaktives Scanning"
    - type: new
      text_en: "Stage indicator on runs list — runs list now displays a deployment stage badge (dev / staging / prod) sourced from the `stage` field persisted per run"
      text_de: "Stage-Anzeige in der Run-Liste — Runs-Liste zeigt jetzt ein Deployment-Stage-Badge (dev / staging / prod), das aus dem pro-Run gespeicherten `stage`-Feld stammt"
    - type: improvement
      text_en: "Access Roles page redesigned — RBAC scope annotations added per feature; page now reflects the full role hierarchy from wafpass-server"
      text_de: "Access-Roles-Seite neu gestaltet — RBAC-Geltungsbereichsannotierungen je Funktion hinzugefügt; Seite spiegelt jetzt die vollständige Rollenhierarchie aus wafpass-server wider"
    - type: improvement
      text_en: "Dashboard page redesign — DashboardPage fully rebuilt with new KPI cards, compliance score ring, pillar-by-pillar breakdown, and improved run comparison view; CostImpactPage updated to match the new design system"
      text_de: "Dashboard-Seite neu gestaltet — DashboardPage komplett neu aufgebaut mit neuen KPI-Karten, Compliance-Score-Ring, Pillar-für-Pillar-Aufschlüsselung und verbesserter Run-Vergleichsansicht; CostImpactPage an das neue Design-System angepasst"

- group_en: "April 2026 — v0.4.1"
  group_de: "April 2026 — v0.4.1"
  date: "2026-04-16"
  beta: true
  changes:
    - type: new
      text_en: "Skipped Controls page (`#/skipped`) — dedicated page listing all controls that were skipped in the latest run with skip reason and pillar breakdown"
      text_de: "Skipped-Controls-Seite (`#/skipped`) — dedizierte Seite mit allen im letzten Run übersprungenen Controls mit Skip-Grund und Pillar-Aufschlüsselung"
    - type: fix
      text_en: "Issue #2 — run list rendering bug corrected; issue #3 — waiver expiry date display corrected"
      text_de: "Issue #2 — Renderfehler in der Run-Liste korrigiert; Issue #3 — Anzeige des Waiver-Ablaufdatums korrigiert"
      pr: 4

- group_en: "April 2026"
  group_de: "April 2026"
  version: "v0.4.0"
  date: "2026-04-08"
  beta: true
  changes:
    - type: new
      text_en: "Run comparison page (#/diff) — side-by-side finding-level diff between any two stored runs; highlights newly introduced, resolved, and unchanged findings across the run history"
      text_de: "Run-Vergleichs-Seite (#/diff) — Finding-Level-Diff zwischen zwei beliebigen gespeicherten Runs nebeneinander; hebt neu eingeführte, gelöste und unveränderte Findings über die Run-Historie hervor"
    - type: new
      text_en: "Secret Scanner page (#/secrets) — dedicated view for hardcoded credential findings; results are persisted to wafpass-server and shown across sessions; findings include file path, line, secret type, and severity"
      text_de: "Secret-Scanner-Seite (#/secrets) — dedizierte Ansicht für Hardcoded-Credential-Findings; Ergebnisse werden in wafpass-server gespeichert und sitzungsübergreifend angezeigt; Findings enthalten Dateipfad, Zeile, Secret-Typ und Schweregrad"
    - type: new
      text_en: "Module Scores page (#/modules) — per-Terraform-module pass rate breakdown; surfaces which modules contribute most to compliance failures and score regressions"
      text_de: "Module-Scores-Seite (#/modules) — Pass-Rate-Aufschlüsselung pro Terraform-Modul; zeigt, welche Module am stärksten zu Compliance-Fehlern und Score-Regressionen beitragen"
    - type: new
      text_en: "Audit Log page (#/audit) — timestamped event log of all waiver and risk acceptance create/update/delete events; exportable as CSV or JSON; includes first-seen failure tracking per control"
      text_de: "Audit-Log-Seite (#/audit) — zeitgestempeltes Ereignisprotokoll aller Waiver- und Risk-Acceptance-Erstell-/Aktualisierungs-/Löschereignisse; als CSV oder JSON exportierbar; enthält First-Seen-Failure-Tracking je Control"
    - type: new
      text_en: "Changes & Drift page enhancements (#/changes) — new drift detection view alongside the Terraform plan changes view; surfaces controls that changed status between runs without an explicit code change"
      text_de: "Änderungs- & Drift-Seite erweitert (#/changes) — neue Drift-Erkennungsansicht neben der Terraform-Plan-Änderungsansicht; zeigt Controls, die zwischen Runs ihren Status geändert haben, ohne explizite Code-Änderung"
    - type: new
      text_en: "Gap Analysis page (#/gapanalysis) — regulator gap analysis showing the shortest path to full compliance for each supported regulatory framework (SOC2, ISO 27001, PCI-DSS, GDPR, BSI C5, HIPAA, NIS2)"
      text_de: "Gap-Analysis-Seite (#/gapanalysis) — regulatorische Gap-Analyse mit dem kürzesten Weg zur vollständigen Compliance für jedes unterstützte regulatorische Rahmenwerk (SOC2, ISO 27001, PCI-DSS, DSGVO, BSI C5, HIPAA, NIS2)"
    - type: new
      text_en: "Cost Impact page (#/cost) — $/month impact estimate for failing WAF-COST controls; quantifies financial risk of each failing cost control so remediation can be prioritised by business impact"
      text_de: "Kostenauswirkungs-Seite (#/cost) — $/Monat-Auswirkungsschätzung für fehlschlagende WAF-COST-Controls; quantifiziert das finanzielle Risiko jedes fehlschlagenden Cost-Controls, damit Remediation nach Business-Impact priorisiert werden kann"
    - type: new
      text_en: "Waivers page (#/waivers) with server persistence — waivers are stored in wafpass-server via the /waivers API; local waivers are automatically synced to the server when a connection is available (configurable in Settings)"
      text_de: "Waivers-Seite (#/waivers) mit Server-Persistenz — Waivers werden über die /waivers-API in wafpass-server gespeichert; lokale Waivers werden automatisch mit dem Server synchronisiert, sobald eine Verbindung besteht (konfigurierbar in den Einstellungen)"
    - type: new
      text_en: "Risk Acceptance page (#/risk) — formally accept residual risks with approver sign-off, RFC reference, Jira link, risk level, and expiry date; stored in wafpass-server with full traceability"
      text_de: "Risk-Acceptance-Seite (#/risk) — Restrisiken formal akzeptieren mit Genehmiger-Abzeichnung, RFC-Referenz, Jira-Link, Risikolevel und Ablaufdatum; wird in wafpass-server mit vollständiger Rückverfolgbarkeit gespeichert"
    - type: new
      text_en: "Evidence Package page (#/evidence) — generates a self-contained timestamped HTML audit report for auditors; includes passing controls with regulatory mapping, active waivers, risk acceptances, audit event log, and embedded JSON manifest; printable to PDF for submission"
      text_de: "Evidence-Package-Seite (#/evidence) — erstellt einen eigenständigen zeitgestempelten HTML-Audit-Bericht für Auditoren; enthält bestandene Controls mit regulatorischem Mapping, aktive Waivers, Risk-Acceptances, Audit-Ereignisprotokoll und eingebettetes JSON-Manifest; für die Einreichung als PDF druckbar"
    - type: new
      text_en: "Persistent deep links — every page and run combination has a shareable URL; a Copy link button in the header copies the current deep link to clipboard"
      text_de: "Persistente Deep-Links — jede Seite und Run-Kombination hat eine teilbare URL; ein Copy-Link-Schaltfläche in der Kopfzeile kopiert den aktuellen Deep-Link in die Zwischenablage"
    - type: new
      text_en: "Sandbox deep link — sandbox run results can be bookmarked and shared via a stable URL; result state is encoded in the URL for instant replay"
      text_de: "Sandbox-Deep-Link — Sandbox-Run-Ergebnisse können als Lesezeichen gespeichert und über eine stabile URL geteilt werden; Ergebniszustand wird für sofortige Wiedergabe in der URL kodiert"
    - type: new
      text_en: "Findings bulk actions — select multiple findings with checkboxes to waive all selected (shared reason, owner, expiry) or export selection as CSV; per-filtered-view CSV export always available in the filter bar"
      text_de: "Findings-Massenaktionen — mehrere Findings per Checkbox auswählen, um alle Ausgewählten zu waiven (gemeinsamer Grund, Eigentümer, Ablauf) oder als CSV zu exportieren; CSV-Export der gefilterten Ansicht immer in der Filterleiste verfügbar"
    - type: improvement
      text_en: "Settings: maturity level presets — five presets (L1 Foundational through L5 Excellence) configure active controls, pillars, and feature toggles; runtime server URL override stored in localStorage without rebuild"
      text_de: "Einstellungen: Reifegradvoreinstellungen — fünf Voreinstellungen (L1 Foundational bis L5 Excellence) konfigurieren aktive Controls, Pillars und Feature-Toggles; Runtime-Server-URL-Überschreibung in localStorage ohne Neubau gespeichert"
    - type: improvement
      text_en: "Empty state guidance — all pages now show contextual guidance when no data is available, directing users to run a scan or configure the server connection"
      text_de: "Leerstatusführung — alle Seiten zeigen jetzt kontextbezogene Hinweise, wenn keine Daten verfügbar sind, und leiten Benutzer zum Ausführen eines Scans oder zur Konfiguration der Serververbindung"
    - type: fix
      text_en: "Blast radius and dependency graph view corrected — rendering edge cases with circular dependencies and missing nodes resolved"
      text_de: "Blast-Radius- und Abhängigkeitsgraph-Ansicht korrigiert — Rendering-Randfälle mit zirkulären Abhängigkeiten und fehlenden Knoten behoben"
    - type: docs
      text_en: "TECH.md added — documents routing implementation, page inventory, maturity level configuration, LocalStorage schema, and component contribution guidance"
      text_de: "TECH.md hinzugefügt — dokumentiert Routing-Implementierung, Seiteninventar, Reifegradkonfiguration, LocalStorage-Schema und Komponentenbeitragshinweise"

- group_en: "March 2026"
  group_de: "März 2026"
  date: "2026-03-29"
  beta: true
  changes:
    - type: new
      text_en: "Controls Catalogue page — replaces the Controls Library with a full-featured catalogue that unifies WAF++ core controls and custom controls authored via wafpass control generate; supports filtering by pillar, severity, type, and engine (terraform, checkov, manual)"
      text_de: "Controls-Katalog-Seite — ersetzt die Controls-Bibliothek durch einen vollständigen Katalog, der WAF++-Core-Controls und via wafpass control generate erstellte Custom-Controls vereint; unterstützt Filterung nach Pillar, Schweregrad, Typ und Engine (terraform, checkov, manual)"
    - type: improvement
      text_en: "Navigation: 'Controls Library' renamed to 'Controls Catalogue' — reflects the expanded scope of the page (core controls, custom controls, browse, filter, author, and export)"
      text_de: "Navigation: 'Controls Library' in 'Controls Catalogue' umbenannt — spiegelt den erweiterten Seitenumfang wider (Core-Controls, Custom-Controls, Browsen, Filtern, Erstellen und Exportieren)"
    - type: new
      text_en: "Checkov engine badge in the catalogue — controls targeting the checkov engine are displayed with a dedicated badge, distinguishing them from terraform and manual controls"
      text_de: "Checkov-Engine-Badge im Katalog — Controls, die den Checkov-Engine als Ziel haben, werden mit einem eigenen Badge angezeigt und von Terraform- und manuellen Controls unterschieden"
    - type: improvement
      text_en: "Controls API integration — catalogue fetches and creates controls via the wafpass-server /controls endpoints, enabling custom controls authored from the CLI or the wizard to appear alongside framework controls in real time"
      text_de: "Controls-API-Integration — Katalog ruft Controls über die wafpass-server /controls-Endpunkte ab und erstellt sie dort, sodass über CLI oder Wizard erstellte Custom-Controls in Echtzeit neben Framework-Controls erscheinen"

- group_en: "March 2026 — Initial Release"
  group_de: "März 2026 — Erste Version"
  version: "v0.3.0"
  date: "2026-03-28"
  beta: true
  changes:
    - type: new
      text_en: "Terraform plan changes page — visualises resource-level changes from a Terraform plan dry-run before apply; integrates with wafpass-server"
      text_de: "Terraform-Plan-Änderungsseite — visualisiert Ressourcen-Änderungen eines Terraform-Plan-Dry-Runs vor dem Apply; integriert mit wafpass-server"
    - type: improvement
      text_en: "Dashboard page overhaul — richer metrics, control state breakdown, compliance score timeline, and run comparison view"
      text_de: "Dashboard-Seite überarbeitet — reichhaltigere Metriken, Control-Status-Aufschlüsselung, Compliance-Score-Timeline und Run-Vergleichsansicht"
    - type: improvement
      text_en: "Exploit paths page redesigned — clearer attack chain visualisation with severity badges and remediation links"
      text_de: "Exploit-Pfad-Seite neu gestaltet — klarere Angriffsketten-Visualisierung mit Schweregrad-Badges und Remediation-Links"
    - type: improvement
      text_en: "Controls and run scan pages polished — improved layout, filtering, and user interaction flows"
      text_de: "Controls- und Run-Scan-Seiten poliert — verbessertes Layout, Filterung und Benutzerinteraktionsflüsse"
    - type: fix
      text_en: "Release workflow bugfix and missing file patch"
      text_de: "Bugfix im Release-Workflow und fehlende Datei ergänzt"
    - type: new
      text_en: "Full-featured SPA — Dashboard, Compliance, Controls, Findings, Regions, Risk Acceptance (Waivers), Sandbox, Settings, Exploit Paths, and Run Scan pages"
      text_de: "Vollständige SPA — Seiten für Dashboard, Compliance, Controls, Findings, Regionen, Risiko-Akzeptanz (Waivers), Sandbox, Einstellungen, Exploit-Pfade und Run-Scan"
    - type: new
      text_en: "React / Vite SPA with Docker + nginx — self-contained container served behind nginx; deployable standalone or as part of the WAFPass stack"
      text_de: "React / Vite SPA mit Docker + nginx — eigenständiger Container hinter nginx; deploybar als Standalone oder als Teil des WAFPass-Stacks"
