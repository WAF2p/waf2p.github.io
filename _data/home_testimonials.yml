en:
  section_aria: "References"
  kicker: "REFERENCES"
  heading: "Trusted by cloud practitioners."
  items:
    - quote: "WAF++ provides a stable foundation for digital applications and shows how technical precision and design sensitivity can be successfully combined."
      name: "Lydia Hundsdörfer"
      role: "Project & Partner Manager, Vogel IT"
      image: "https://lirp.cdn-website.com/9dbc9654/dms3rep/multi/opt/lydia-01-1920w.jpg"
      placeholder: null
    - quote: "WAF++ has great potential to become the perfect answer to real-world everyday questions from the technology, cloud & developer community."
      name: "Maximilian Hille"
      role: "Cloud Analyst"
      image: "https://lirp.cdn-website.com/9dbc9654/dms3rep/multi/opt/Profilbild_Maximilian_Hille_weiss-1920w.jpg"
      placeholder: null
    - quote: "Finally a framework that is not a sales pitch in disguise. WAF++ is built by engineers, for engineers."
      name: "Community Contributor"
      role: "Platform Engineer"
      image: null
      placeholder: "S"
    - quote: "The sovereign pillar alone makes WAF++ worth adopting for any European organization."
      name: "Cloud Architect"
      role: "FinTech"
      image: null
      placeholder: "A"

de:
  section_aria: "Referenzen"
  kicker: "REFERENZEN"
  heading: "Von Cloud-Praktikern vertraut."
  items:
    - quote: "WAF++ bietet eine stabile Grundlage für digitale Anwendungen und zeigt, wie technische Präzision und gestalterische Sensibilität erfolgreich zusammengeführt werden können."
      name: "Lydia Hundsdörfer"
      role: "Project & Partner Manager, Vogel IT"
      image: "https://lirp.cdn-website.com/9dbc9654/dms3rep/multi/opt/lydia-01-1920w.jpg"
      placeholder: null
    - quote: "WAF++ hat das große Potential, die perfekte Antwort auf die realen Alltagsfragen der Technologie-, Cloud- & Developer-Community zu werden."
      name: "Maximilian Hille"
      role: "Cloud Analyst"
      image: "https://lirp.cdn-website.com/9dbc9654/dms3rep/multi/opt/Profilbild_Maximilian_Hille_weiss-1920w.jpg"
      placeholder: null
    - quote: "Endlich ein Framework, das keine verkaufsgetriebene Agenda verfolgt. WAF++ ist von Engineers für Engineers gebaut."
      name: "Community Contributor"
      role: "Platform Engineer"
      image: null
      placeholder: "S"
    - quote: "Die Sovereign-Säule allein macht WAF++ für jedes europäische Unternehmen interessant."
      name: "Cloud Architect"
      role: "FinTech"
      image: null
      placeholder: "A"
