# WAFPass changelog — data source for /changelog/ and /de/changelog/
# WAFPass v1.0 planned alongside Framework v1.0 (shortly before 2026-05-12)
# Order: newest first. Add new groups at the top.
# Types: new | improvement | fix | docs | infra | breaking

- group_en: "March 2026"
  group_de: "März 2026"
  date: "2026-03"
  beta: true
  changes:
    - type: new
      text_en: "Alicloud, Yandex Cloud, and Oracle Cloud datacenter support added to geographic data model"
      text_de: "Alicloud, Yandex Cloud und Oracle Cloud Rechenzentrumsunterstützung zum geografischen Datenmodell hinzugefügt"
    - type: new
      text_en: "Executive summary added to PDF reports — high-level compliance overview at the start of each report"
      text_de: "Executive Summary in PDF-Reports hinzugefügt — übergeordnete Compliance-Übersicht am Anfang jedes Reports"
    - type: new
      text_en: "Decision board added to PDF reports — structured decision support section for stakeholder communication"
      text_de: "Decision Board in PDF-Reports hinzugefügt — strukturierter Entscheidungsunterstützungsbereich für Stakeholder-Kommunikation"
    - type: improvement
      text_en: "Financial impact split into distinct root groups in PDF reports for clearer risk cost attribution"
      text_de: "Finanzielle Auswirkungen in PDF-Reports in separate Wurzelgruppen aufgeteilt für klarere Risikokostenzuordnung"
    - type: new
      text_en: "Multi / split report mode — single wafpass run can now generate separate reports per pillar or module"
      text_de: "Multi / Split-Report-Modus — ein einzelner wafpass-Lauf kann jetzt separate Reports pro Säule oder Modul erzeugen"
    - type: new
      text_en: "Intentional skip support — controls can be explicitly marked as skipped via a skip file; skipped items are reflected in report output"
      text_de: "Intentionales Skip-Feature — Controls können über eine Skip-Datei explizit als übersprungen markiert werden; übersprungene Controls werden im Report ausgegeben"
    - type: fix
      text_en: "CLI skip file detection — corrected path resolution for the skip configuration file"
      text_de: "CLI Skip-Datei-Erkennung — Pfadauflösung für die Skip-Konfigurationsdatei korrigiert"
    - type: new
      text_en: "Risk estimation in PDF reports — fact-based risk estimation and risk cost estimation added to compliance report output"
      text_de: "Risikoschätzung in PDF-Reports — faktenbasierte Risikoschätzung und Risikokostenabschätzung dem Compliance-Report-Output hinzugefügt"
    - type: new
      text_en: "OpenStreetMap integration in PDF reports — geographic map rendered directly in the PDF output"
      text_de: "OpenStreetMap-Integration in PDF-Reports — geografische Karte wird direkt in der PDF-Ausgabe gerendert"
    - type: new
      text_en: "Regional spread map in PDF reports — map visualising worldwide data distribution across regions"
      text_de: "Regionale Verteilungskarte in PDF-Reports — Karte zur Visualisierung der weltweiten Datenverteilung über Regionen"
    - type: new
      text_en: "Regulatory controls mapping — controls can now be mapped to regulatory frameworks (e.g. GDPR, BSI, ISO 27001) in PDF reports"
      text_de: "Regulatorisches Controls-Mapping — Controls können nun in PDF-Reports regulatorischen Rahmenwerken (z.B. DSGVO, BSI, ISO 27001) zugeordnet werden"
    - type: new
      text_en: "Dynamic pillar loading — control logic is now embedded in each control file; any new pillar loads automatically without code changes"
      text_de: "Dynamisches Pillar-Laden — Control-Logik ist jetzt in jeder Control-Datei eingebettet; neue Pillars werden automatisch ohne Code-Änderungen geladen"
    - type: new
      text_en: "PDF export of compliance check results — shareable reports directly from the CLI"
      text_de: "PDF-Export der Compliance-Check-Ergebnisse — teilbare Reports direkt aus dem CLI"
    - type: new
      text_en: "Security pillar (Pillar 1) checks added — first non-cost control set integrated"
      text_de: "Security-Pillar-Checks (Säule 1) hinzugefügt — erster Nicht-Cost-Kontrollsatz integriert"
    - type: new
      text_en: "Initial control check application — base architecture, control loading, and pillar evaluation engine"
      text_de: "Initiale Control-Check-Applikation — Basis-Architektur, Control-Loading und Pillar-Evaluierungs-Engine"
      pr: 1

- group_en: "February 2026 — Initial Commit"
  group_de: "Februar 2026 — Erster Commit"
  date: "2026-02"
  beta: true
  changes:
    - type: infra
      text_en: "WAFPass repository initialized — first public commit"
      text_de: "WAFPass-Repository initialisiert — erster öffentlicher Commit"
