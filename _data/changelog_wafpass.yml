# WAFPass changelog — data source for /changelog/ and /de/changelog/
# WAFPass v1.0 planned alongside Framework v1.0 (shortly before 2026-05-12)
# Order: newest first. Add new groups at the top.
# Types: new | improvement | fix | docs | infra | breaking

- group_en: "April 2026"
  group_de: "April 2026"
  version: "v0.4.0"
  date: "2026-04-08"
  beta: true
  changes:
    - type: new
      text_en: "Secret findings persistency — secret scanner results are now persisted to wafpass-server via the secret_findings JSONB column; results are synced on scan and visible across sessions in the dashboard"
      text_de: "Secret-Findings-Persistenz — Secret-Scanner-Ergebnisse werden jetzt über die secret_findings-JSONB-Spalte in wafpass-server gespeichert; Ergebnisse werden bei jedem Scan synchronisiert und sind sitzungsübergreifend im Dashboard sichtbar"
    - type: new
      text_en: "Python library API — wafpass-core now exposes a stable public API: run_scan(paths, controls_dir) → WafpassResultSchema; import and embed the engine directly in Python applications or pipelines without invoking the CLI"
      text_de: "Python-Bibliotheks-API — wafpass-core stellt jetzt eine stabile öffentliche API bereit: run_scan(paths, controls_dir) → WafpassResultSchema; Engine kann direkt in Python-Anwendungen oder Pipelines eingebettet werden ohne das CLI aufzurufen"
    - type: docs
      text_en: "TECH.md added — comprehensive technical reference covering internal architecture, IaC plugin system, assertion evaluation loop, SKIP semantics, scoring formula, known unimplemented operators, and contribution guidance"
      text_de: "TECH.md hinzugefügt — umfassende technische Referenz zu interner Architektur, IaC-Plugin-System, Assertion-Evaluierungs-Loop, SKIP-Semantik, Scoring-Formel, bekannten nicht implementierten Operatoren und Beitragshinweisen"

- group_en: "March 2026"
  group_de: "März 2026"
  date: "2026-03-29"
  beta: true
  changes:
    - type: new
      text_en: "wafpass control — new subcommand group for authoring, validating, and managing WAF++ controls directly from the CLI"
      text_de: "wafpass control — neue Subcommand-Gruppe zum Erstellen, Validieren und Verwalten von WAF++-Controls direkt aus dem CLI"
    - type: new
      text_en: "wafpass control generate — interactive 7-step wizard to author a new WAF++ control: describe the requirement, classify (pillar, severity, type), define checks, preview and edit (YAML + $EDITOR), validate, export (YAML control + Checkov Python stub), and optionally push to wafpass-server; also supports a non-interactive --non-interactive mode via JSON/YAML spec file"
      text_de: "wafpass control generate — interaktiver 7-Schritte-Assistent zum Erstellen neuer WAF++-Controls: Anforderung beschreiben, klassifizieren (Pillar, Schweregrad, Typ), Checks definieren, Vorschau und Bearbeiten (YAML + $EDITOR), validieren, exportieren (YAML-Control + Checkov-Python-Stub) und optional an wafpass-server pushen; unterstützt auch den nicht-interaktiven Modus via JSON/YAML-Spec-Datei (--non-interactive)"
    - type: new
      text_en: "wafpass control validate — validate any YAML control file against the WizardControl Pydantic schema; reports id, pillar, and severity on success or detailed field-level errors on failure"
      text_de: "wafpass control validate — beliebige YAML-Control-Datei gegen das WizardControl-Pydantic-Schema validieren; gibt bei Erfolg id, Pillar und Schweregrad aus, bei Fehler detaillierte Feldebenen-Fehler"
    - type: new
      text_en: "wafpass control list — list all controls found under a controls directory, rendered as a table with id, pillar, severity, and type"
      text_de: "wafpass control list — alle Controls im Controls-Verzeichnis auflisten, als Tabelle mit id, Pillar, Schweregrad und Typ dargestellt"
    - type: new
      text_en: "wafpass control show — print the full YAML of a single control by ID"
      text_de: "wafpass control show — vollständiges YAML eines einzelnen Controls anhand der ID ausgeben"
    - type: new
      text_en: "Checkov integration — controls can now target the 'checkov' engine; wafpass control generate exports a Python Checkov check stub alongside the YAML control file, enabling policy-as-code enforcement via Checkov pipelines"
      text_de: "Checkov-Integration — Controls können jetzt den 'checkov'-Engine als Ziel angeben; wafpass control generate exportiert einen Python-Checkov-Check-Stub neben der YAML-Control-Datei und ermöglicht so Policy-as-Code-Durchsetzung über Checkov-Pipelines"
    - type: new
      text_en: "control_schema.py — Pydantic schema (WizardControl, WizardCheck) as single source of truth for validating wizard-generated controls; defines allowed pillars, severities, types, and engines (terraform, checkov, manual)"
      text_de: "control_schema.py — Pydantic-Schema (WizardControl, WizardCheck) als Single Source of Truth für die Validierung wizard-generierter Controls; definiert erlaubte Pillars, Schweregrade, Typen und Engines (terraform, checkov, manual)"

- group_en: "March 2026"
  group_de: "März 2026"
  version: "v0.3.0"
  date: "2026-03-28"
  beta: true
  changes:
    - type: new
      text_en: "Terraform plan dry-run analysis — WAFPass can now parse Terraform plan output and evaluate security, compliance, and blast-radius impact before `terraform apply`"
      text_de: "Terraform-Plan-Dry-Run-Analyse — WAFPass kann jetzt die Terraform-Plan-Ausgabe parsen und Security-, Compliance- und Blast-Radius-Auswirkungen vor `terraform apply` auswerten"
    - type: new
      text_en: "Exploit path analysis — controls can now expose attack chains and exploit paths that lead to a failing state, visualised in the dashboard"
      text_de: "Exploit-Pfad-Analyse — Controls können jetzt Angriffsketten und Exploit-Pfade aufzeigen, die zu einem Fehler-Status führen, visualisiert im Dashboard"
    - type: new
      text_en: "Settings persistence — CLI and dashboard settings (API URL, report preferences, thresholds) are now persisted across sessions"
      text_de: "Einstellungs-Persistenz — CLI- und Dashboard-Einstellungen (API-URL, Report-Präferenzen, Schwellenwerte) werden jetzt sitzungsübergreifend gespeichert"
    - type: new
      text_en: "Policy version tracking — controls now carry a policy version field, enabling detection of stale controls against the current framework version"
      text_de: "Policy-Versions-Tracking — Controls tragen jetzt ein Policy-Versionsfeld, das die Erkennung veralteter Controls gegenüber der aktuellen Framework-Version ermöglicht"
    - type: new
      text_en: "Changelog and install tab in dashboard — in-app changelog and installation guide accessible from within the web UI"
      text_de: "Changelog- und Installations-Tab im Dashboard — In-App-Changelog und Installationsanleitung direkt aus dem Web-UI zugänglich"
    - type: infra
      text_en: "Architectural split — dashboard UI extracted to wafpass-dashboard (React / Vite SPA) and persistence layer to wafpass-server (FastAPI / PostgreSQL); wafpass CLI remains the core evaluation engine"
      text_de: "Architekturelle Aufteilung — Dashboard-UI in wafpass-dashboard (React / Vite SPA) und Persistenzschicht in wafpass-server (FastAPI / PostgreSQL) ausgelagert; das wafpass CLI bleibt die zentrale Evaluierungs-Engine"
    - type: improvement
      text_en: "Enhanced CLI evaluation commands — additional control evaluation capabilities and improved output for programmatic consumption"
      text_de: "Erweiterte CLI-Evaluierungsbefehle — zusätzliche Control-Evaluierungsfähigkeiten und verbesserter Output für programmatische Weiterverarbeitung"
    - type: improvement
      text_en: "Dashboard data schema updated — extended schema for richer control and run metadata to support the new dashboard and server features"
      text_de: "Dashboard-Datenschema aktualisiert — erweitertes Schema für reichhaltigere Control- und Run-Metadaten zur Unterstützung der neuen Dashboard- und Server-Funktionen"

- group_en: "March 2026"
  group_de: "März 2026"
  version: "v0.2.0"
  date: "2026-03-27"
  beta: true
  changes:
    - type: new
      text_en: "Web UI — browser-based dashboard to visualise control results, compliance state, and per-control details"
      text_de: "Web-UI — browserbasiertes Dashboard zur Visualisierung von Control-Ergebnissen, Compliance-Status und Detailansicht je Control"
      pr: 13
    - type: improvement
      text_en: "Mobile-responsive dashboard theme"
      text_de: "Mobil-responsives Dashboard-Theme"
      pr: 13
    - type: new
      text_en: "Deployed regions — compliance output now includes deployed region details per control"
      text_de: "Deployed Regions — Compliance-Output enthält jetzt Informationen zu deployten Regionen je Control"
      pr: 13
    - type: new
      text_en: "Sandbox environment support — controls can be evaluated in sandbox mode"
      text_de: "Sandbox-Umgebungsunterstützung — Controls können im Sandbox-Modus evaluiert werden"
      pr: 13
    - type: new
      text_en: "Risk acceptance (waivers) — controls can be explicitly accepted with justification via a waivers file"
      text_de: "Risiko-Akzeptanz (Waivers) — Controls können über eine Waivers-Datei explizit mit Begründung akzeptiert werden"
      pr: 13
    - type: new
      text_en: "Auto-fix engine — automated remediation suggestions and fixes for failing controls"
      text_de: "Auto-Fix-Engine — automatisierte Behebungsvorschläge und Fixes für fehlschlagende Controls"
      pr: 13
    - type: fix
      text_en: "Favicon added to the web UI"
      text_de: "Favicon zur Web-UI hinzugefügt"
      pr: 13
    - type: new
      text_en: "Carbon footprint estimation — ESG module tracks and reports carbon impact of cloud workload decisions"
      text_de: "Carbon-Footprint-Schätzung — ESG-Modul verfolgt und berichtet den CO₂-Einfluss von Cloud-Workload-Entscheidungen"
      pr: 12
    - type: new
      text_en: "Secret scanner and remediation — detects exposed secrets in configurations and provides actionable remediation guidance"
      text_de: "Secret-Scanner und Remediation — erkennt exponierte Secrets in Konfigurationen und liefert umsetzbare Behebungshinweise"
      pr: 11
    - type: new
      text_en: "Blast radius information for controls — each control now includes a blast radius assessment to quantify potential failure impact"
      text_de: "Blast-Radius-Informationen für Controls — jede Control enthält jetzt eine Blast-Radius-Bewertung zur Quantifizierung des potenziellen Ausfallimpakts"
      pr: 10
    - type: docs
      text_en: "Permitted Git workflow documented — contributing guide for branching, PRs, and release process added to the repository"
      text_de: "Erlaubter Git-Workflow dokumentiert — Contributing-Guide für Branching, PRs und Release-Prozess dem Repository hinzugefügt"

- group_en: "March 2026"
  group_de: "März 2026"
  version: "v0.1.1"
  date: "2026-03-22"
  beta: true
  changes:
    - type: fix
      text_en: "Release workflow corrected — GitHub Actions pipeline for PyPI publishing was failing; resolved path and trigger issues"
      text_de: "Release-Workflow korrigiert — GitHub-Actions-Pipeline für PyPI-Publishing schlug fehl; Pfad- und Trigger-Probleme behoben"
