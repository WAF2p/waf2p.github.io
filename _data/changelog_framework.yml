# Framework changelog — data source for /changelog/ and /de/changelog/
# Framework v1.0 released: 2026-05-12
# Order: newest first. Add new groups at the top.
# Types: new | improvement | fix | docs | infra | breaking

- group_en: "May 2026"
  group_de: "Mai 2026"
  version: "v1.0.0"
  date: "2026-05-12"
  beta: false
  changes:
    - type: new
      text_en: "WAF++ Framework v1.0.0 — first stable release. All seven pillars are fully documented with complete control sets, design principles, best practices, maturity models, regulatory mappings (GDPR, BSI C5, ISO 27001, SOC 2, HIPAA, NIS2), evidence, scope, and glossary. Released on the pre-eve of Cloud Native Conference DE."
      text_de: "WAF++ Framework v1.0.0 — erste stabile Veröffentlichung. Alle sieben Säulen vollständig dokumentiert mit vollständigen Control-Sets, Design-Prinzipien, Best Practices, Reifegradmodellen, regulatorischen Mappings (DSGVO, BSI C5, ISO 27001, SOC 2, HIPAA, NIS2), Evidenz, Scope und Glossar. Veröffentlicht am Vorabend der Cloud Native Conference DE."
    - type: improvement
      text_en: "Security pillar (Pillar 1) — documentation finalized with full WAF-SEC control set, zero-trust model, IAM hardening guidelines, encryption requirements, and compliance evidence templates"
      text_de: "Security-Pillar (Säule 1) — Dokumentation finalisiert mit vollständigem WAF-SEC-Control-Set, Zero-Trust-Modell, IAM-Hardening-Richtlinien, Verschlüsselungsanforderungen und Compliance-Evidenz-Templates"
    - type: improvement
      text_en: "PASS scoring model v1.0 — stable scoring formula across all seven pillars; maturity levels L1 (Foundational) through L5 (Excellence) are locked and documented"
      text_de: "PASS-Scoring-Modell v1.0 — stabile Scoring-Formel über alle sieben Säulen; Reifegrade L1 (Foundational) bis L5 (Excellence) sind festgelegt und dokumentiert"
    - type: improvement
      text_en: "Controls library stabilized — all WAF-SEC, WAF-COST, WAF-PERF, WAF-REL, WAF-OPS, WAF-SUS, and WAF-SOV controls locked at v1.0; control schema frozen for stable tooling integration"
      text_de: "Controls-Bibliothek stabilisiert — alle WAF-SEC, WAF-COST, WAF-PERF, WAF-REL, WAF-OPS, WAF-SUS und WAF-SOV Controls auf v1.0 eingefroren; Control-Schema für stabile Tooling-Integration festgelegt"
    - type: new
      text_en: "Cross-pillar reference architecture — canonical reference architecture published showing how all seven pillars interact in a production multi-cloud deployment"
      text_de: "Pillar-übergreifende Referenzarchitektur — kanonische Referenzarchitektur veröffentlicht, die zeigt, wie alle sieben Säulen in einem produktiven Multi-Cloud-Deployment zusammenwirken"
    - type: docs
      text_en: "Framework documentation available at waf2p.dev/docs/wafpp/1.0/ — stable URL, versioned Antora component"
      text_de: "Framework-Dokumentation verfügbar unter waf2p.dev/docs/wafpp/1.0/ — stabile URL, versionierte Antora-Komponente"

