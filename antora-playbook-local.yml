site:
  title: WAF++ Documentation (Local Dev)
  url: http://localhost:8000/docs
  start_page: wafpp::index.adoc

content:
  sources:
  # German content (version: de) — working branch
  - url: ../framework
    branches: main-de
  # English content (version: en)
  - url: ../framework-en
    branches: main-en

antora:
  extensions:
  - require: '@antora/lunr-extension'
    index_latest_only: true
    index_by_heading: true
    languages: [en, de]
    snippet_length: 150
  - require: '@antora/pdf-extension'

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./supplemental-ui

asciidoc:
  extensions:
    - asciidoctor-kroki
    - '@asciidoctor/tabs'
    - asciidoctor-treeview
  attributes:
    page-pagination: ''
    source-language: asciidoc@
    tabs-sync-option: ''

output:
  clean: true
  dir: ./_site/docs
