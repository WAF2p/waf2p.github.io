<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="step1grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0094FF"/>
      <stop offset="100%" stop-color="#005fa8"/>
    </linearGradient>
    <linearGradient id="step2grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="step3grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowblue">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Header -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" opacity="0.5">WAF++ FRAMEWORK</text>
  <text x="400" y="70" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" letter-spacing="-0.02em">Getting Started in 3 Steps</text>

  <!-- Connecting path -->
  <line x1="230" y1="205" x2="310" y2="205" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="490" y1="205" x2="570" y2="205" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="310,200 322,205 310,210" fill="#1e3a5f"/>
  <polygon points="570,200 582,205 570,210" fill="#1e3a5f"/>

  <!-- Step 1: Assess -->
  <rect x="60" y="130" width="170" height="150" rx="14" fill="#0d1f3c" stroke="#0094FF" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Step number badge -->
  <circle cx="145" cy="130" r="16" fill="url(#step1grad)" filter="url(#glowblue)"/>
  <text x="145" y="135" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="900">1</text>
  <!-- Icon area -->
  <rect x="80" y="148" width="130" height="70" rx="8" fill="#091829"/>
  <text x="145" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36">🔍</text>
  <!-- Label -->
  <text x="145" y="238" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="15" font-weight="800">Assess</text>
  <text x="145" y="256" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Apply the 7-pillar</text>
  <text x="145" y="270" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">questionnaire</text>

  <!-- Step 2: Score -->
  <rect x="315" y="130" width="170" height="150" rx="14" fill="#0d1f3c" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="400" cy="130" r="16" fill="url(#step2grad)"/>
  <text x="400" y="135" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="900">2</text>
  <rect x="335" y="148" width="130" height="70" rx="8" fill="#091829"/>
  <text x="400" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36">📊</text>
  <text x="400" y="238" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="15" font-weight="800">Score</text>
  <text x="400" y="256" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Use PASS to rate</text>
  <text x="400" y="270" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">maturity per pillar</text>

  <!-- Step 3: Improve -->
  <rect x="570" y="130" width="170" height="150" rx="14" fill="#0d1f3c" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="655" cy="130" r="16" fill="url(#step3grad)"/>
  <text x="655" y="135" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="900">3</text>
  <rect x="590" y="148" width="130" height="70" rx="8" fill="#091829"/>
  <text x="655" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36">🚀</text>
  <text x="655" y="238" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="15" font-weight="800">Improve</text>
  <text x="655" y="256" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Follow patterns &amp;</text>
  <text x="655" y="270" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">iterate with RFCs</text>

  <!-- PASS scoring legend -->
  <text x="400" y="320" text-anchor="middle" fill="#3a5a80" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">PASS SCORING MODEL</text>

  <rect x="80" y="333" width="140" height="38" rx="7" fill="#0a1e36" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="106" cy="352" r="8" fill="#ef4444"/>
  <text x="125" y="357" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="11" font-weight="600">P — Poor (0)</text>

  <rect x="240" y="333" width="140" height="38" rx="7" fill="#0a1e36" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="266" cy="352" r="8" fill="#f59e0b"/>
  <text x="285" y="357" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="11" font-weight="600">A — Adequate (1)</text>

  <rect x="400" y="333" width="140" height="38" rx="7" fill="#0a1e36" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="426" cy="352" r="8" fill="#0094FF"/>
  <text x="445" y="357" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="11" font-weight="600">S — Strong (2)</text>

  <rect x="560" y="333" width="160" height="38" rx="7" fill="#0a1e36" stroke="#34d399" stroke-width="1"/>
  <circle cx="586" cy="352" r="8" fill="#34d399"/>
  <text x="605" y="357" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="11" font-weight="600">S — Superior (3)</text>

  <!-- Footer -->
  <text x="400" y="418" text-anchor="middle" fill="#3a5a80" font-family="system-ui,sans-serif" font-size="11" font-weight="500">Free to use · Open source · No vendor lock-in · waf2p.dev</text>
</svg>
