<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="pillar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0094FF"/>
      <stop offset="100%" stop-color="#005fa8"/>
    </linearGradient>
    <linearGradient id="pillar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="pillar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pillar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="pillar5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="pillar6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="pillar7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
  </g>

  <!-- Header -->
  <text x="400" y="44" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" opacity="0.5">WAF++ FRAMEWORK</text>
  <text x="400" y="75" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" letter-spacing="-0.02em">The 7 Pillars</text>

  <!-- Baseline -->
  <rect x="60" y="350" width="680" height="3" rx="1.5" fill="#1e3a5f"/>

  <!-- Pillar heights: Security=230, Reliability=200, Performance=170, Cost=210, Operations=190, Sustainability=150, DevEx=180 -->

  <!-- P1 Security -->
  <rect x="68" y="120" width="76" height="230" rx="6" fill="url(#pillar1)" opacity="0.9" filter="url(#glow)"/>
  <rect x="60" y="112" width="92" height="14" rx="4" fill="#0094FF" opacity="0.6"/>
  <text x="104" y="148" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="11" font-weight="700">🔒</text>
  <text x="104" y="370" text-anchor="middle" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Security</text>

  <!-- P2 Reliability -->
  <rect x="164" y="150" width="76" height="200" rx="6" fill="url(#pillar2)" opacity="0.9" filter="url(#glow)"/>
  <rect x="156" y="142" width="92" height="14" rx="4" fill="#22d3ee" opacity="0.6"/>
  <text x="202" y="370" text-anchor="middle" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Reliability</text>

  <!-- P3 Performance -->
  <rect x="260" y="180" width="76" height="170" rx="6" fill="url(#pillar3)" opacity="0.9" filter="url(#glow)"/>
  <rect x="252" y="172" width="92" height="14" rx="4" fill="#a78bfa" opacity="0.6"/>
  <text x="298" y="370" text-anchor="middle" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Performance</text>

  <!-- P4 Cost -->
  <rect x="356" y="140" width="76" height="210" rx="6" fill="url(#pillar4)" opacity="0.9" filter="url(#glow)"/>
  <rect x="348" y="132" width="92" height="14" rx="4" fill="#34d399" opacity="0.6"/>
  <text x="394" y="370" text-anchor="middle" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Cost</text>

  <!-- P5 Operations -->
  <rect x="452" y="160" width="76" height="190" rx="6" fill="url(#pillar5)" opacity="0.9" filter="url(#glow)"/>
  <rect x="444" y="152" width="92" height="14" rx="4" fill="#f97316" opacity="0.6"/>
  <text x="490" y="370" text-anchor="middle" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Operations</text>

  <!-- P6 Sustainability -->
  <rect x="548" y="200" width="76" height="150" rx="6" fill="url(#pillar6)" opacity="0.9" filter="url(#glow)"/>
  <rect x="540" y="192" width="92" height="14" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="586" y="370" text-anchor="middle" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Sustainability</text>

  <!-- P7 DevEx -->
  <rect x="644" y="170" width="76" height="180" rx="6" fill="url(#pillar7)" opacity="0.9" filter="url(#glow)"/>
  <rect x="636" y="162" width="92" height="14" rx="4" fill="#fb7185" opacity="0.6"/>
  <text x="682" y="370" text-anchor="middle" fill="#94b4d4" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Dev Experience</text>

  <!-- Footer label -->
  <text x="400" y="420" text-anchor="middle" fill="#3a5a80" font-family="system-ui,sans-serif" font-size="11" font-weight="500">Open-source · Vendor-neutral · Community-driven</text>
</svg>
