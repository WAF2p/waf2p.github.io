<!doctype html>
{% include lang-vars.html %}
<html lang="{{ lang | escape }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}">

    <link rel="stylesheet" href="{{ '/css/screen.css' | relative_url }}">
    <link rel="icon" href="{{ '/images/WAFpp_upscaled_1000.png' | relative_url }}">

    {% include structured-data.html %}
    {% include seo-head.html %}
  </head>

  <body>
    {% include header.html %}
    <main>
      {% include translation-notice.html %}
      {{ content }}
    </main>
    {% include footer.html %}
    {% include release-modal.html %}

    <!-- Icons (Lucide) -->
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.lucide) { window.lucide.createIcons(); }

        // Polyfill brand icons removed from Lucide
        // LinkedIn
        document.querySelectorAll('[data-lucide="linkedin"]').forEach(function(el) {
          var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('width', '24');
          svg.setAttribute('height', '24');
          svg.setAttribute('viewBox', '0 0 24 24');
          svg.setAttribute('fill', 'none');
          svg.setAttribute('stroke', 'currentColor');
          svg.setAttribute('stroke-width', '2');
          svg.setAttribute('stroke-linecap', 'round');
          svg.setAttribute('stroke-linejoin', 'round');
          for (var i = 0; i < el.attributes.length; i++) {
            var attr = el.attributes[i];
            if (attr.name !== 'data-lucide') svg.setAttribute(attr.name, attr.value);
          }
          var p1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          p1.setAttribute('d', 'M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z');
          var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          rect.setAttribute('width', '4');
          rect.setAttribute('height', '12');
          rect.setAttribute('x', '2');
          rect.setAttribute('y', '9');
          var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', '4');
          circle.setAttribute('cy', '4');
          circle.setAttribute('r', '2');
          svg.appendChild(p1);
          svg.appendChild(rect);
          svg.appendChild(circle);
          if (el.parentNode) el.parentNode.replaceChild(svg, el);
        });

        // GitHub
        document.querySelectorAll('[data-lucide="github"]').forEach(function(el) {
          var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('width', '24');
          svg.setAttribute('height', '24');
          svg.setAttribute('viewBox', '0 0 24 24');
          svg.setAttribute('fill', 'none');
          svg.setAttribute('stroke', 'currentColor');
          svg.setAttribute('stroke-width', '2');
          svg.setAttribute('stroke-linecap', 'round');
          svg.setAttribute('stroke-linejoin', 'round');
          for (var i = 0; i < el.attributes.length; i++) {
            var attr = el.attributes[i];
            if (attr.name !== 'data-lucide') svg.setAttribute(attr.name, attr.value);
          }
          var p1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          p1.setAttribute('d', 'M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4');
          var p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          p2.setAttribute('d', 'M9 18c-4.51 2-5-2-7-2');
          svg.appendChild(p1);
          svg.appendChild(p2);
          if (el.parentNode) el.parentNode.replaceChild(svg, el);
        });
      });
    </script>

    <!-- Site JS -->
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/release-modal.js' | relative_url }}" defer></script>
  </body>
</html>
